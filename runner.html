<!DOCTYPE html>
<html>
<head>
    <title>Runner Portal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <style>
        body { font-family: -apple-system, sans-serif; text-align: center; padding: 20px; background: #121212; color: white; }
        .setup-screen, .active-screen { display: none; }
        .visible { display: block; }
        input, select { padding: 18px; width: 90%; margin-bottom: 20px; font-size: 18px; border-radius: 12px; border: 1px solid #444; background: #222; color: white; }
        button { padding: 25px; width: 100%; font-size: 22px; cursor: pointer; border: none; border-radius: 18px; font-weight: bold; text-transform: uppercase; }
        .btn-join { background: #3b82f6; color: white; }
        .btn-ready { background: #22c55e; color: white; height: 250px; margin-top: 20px; }
        .btn-cancel { background: #ef4444; color: white; margin-top: 30px; padding: 15px; font-size: 16px; width: 70%; }
        .status-ready { background: #064e3b !important; }
    </style>
</head>
<body>

    <div id="setup" class="setup-screen">
        <h1>Theatre Registration</h1>
        <input type="text" id="runnerName" placeholder="Your Name">
        <p>Select Your Position:</p>
        <select id="zoneSelect">
            <optgroup label="Top Row">
                <option value="row1_left">Circle 2 - Center</option>
                <option value="row1_right">Circle 1 - Mid</option>
            </optgroup>
            <optgroup label="Mid Row">
                <option value="row2_left">Circle 2 - Left</option>
                <option value="row2_right">Circle 2 - Right</option>
            </optgroup>
            <optgroup label="3rd Row">
                <option value="row3_left">Stalls - Mid Left</option>
                <option value="row3_right">Stalls - Mid Right</option>
            </optgroup>
            <optgroup label="Bottom Row">
                <option value="row4_left">Stalls - Extreme Left</option>
                <option value="row4_right">Stalls - Extreme Right</option>
            </optgroup>
        </select>
        <button class="btn-join" onclick="checkAndRegister()">Join Session</button>
    </div>

    <div id="active" class="active-screen">
        <h2 id="greeting">Hi</h2>
        <div id="statusIndicator">Status: Waiting</div>
        <button id="readyBtn" class="btn-ready" onclick="setStatus(true)">I HAVE A PERSON</button>
        <button class="btn-cancel" onclick="setStatus(false)">CANCEL</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAvCi3zJFyC-MTyoGR941HFupcUMgPlvtM",
            authDomain: "runner-qna-webapp.firebaseapp.com",
            databaseURL: "https://runner-qna-webapp-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "runner-qna-webapp",
            storageBucket: "runner-qna-webapp.appspot.com",
            messagingSenderId: "553192423696",
            appId: "1:553192423696:web:95785e12d122407eb46595"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        
        let myName = localStorage.getItem('activeRunnerName');

        if (myName) { showActiveScreen(); } 
        else { document.getElementById('setup').classList.add('visible'); }

        async function checkAndRegister() {
            const name = document.getElementById('runnerName').value.trim();
            const zone = document.getElementById('zoneSelect').value;
            if (!name) return alert("Enter name!");

            const snapshot = await database.ref('liveSession').once('value');
            const data = snapshot.val();
            let isTaken = false;
            
            if (data) {
                Object.values(data).forEach(r => {
                    if (r.zone === zone) isTaken = true;
                });
            }

            if (isTaken) {
                alert("This position is already taken!");
            } else {
                myName = name;
                localStorage.setItem('activeRunnerName', myName);
                database.ref('liveSession/' + myName).set({ active: false, zone: zone });
                showActiveScreen();
            }
        }

        function showActiveScreen() {
            document.getElementById('setup').classList.remove('visible');
            document.getElementById('active').classList.add('visible');
            document.getElementById('greeting').innerText = myName;
            
            database.ref('liveSession/' + myName).on('value', (snap) => {
                if (!snap.exists()) {
                    localStorage.removeItem('activeRunnerName');
                    location.reload(); 
                } else {
                    const data = snap.val();
                    document.getElementById('statusIndicator').innerText = data.active ? "STATUS: READY" : "Status: Waiting";
                    if(data.active) document.body.classList.add('status-ready');
                    else document.body.classList.remove('status-ready');
                }
            });
        }

        function setStatus(isReady) {
            database.ref('liveSession/' + myName).update({ active: isReady });
        }
    </script>
</body>
</html>
