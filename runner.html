<!DOCTYPE html>
<html>
<head>
    <title>Runner Portal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <style>
        body { font-family: -apple-system, sans-serif; text-align: center; padding: 20px; background: #121212; color: white; transition: background 0.3s; }
        .setup-screen { display: block; padding-top: 50px; }
        .active-screen { display: none; }
        input { padding: 18px; width: 85%; margin-bottom: 20px; font-size: 18px; border-radius: 12px; border: 1px solid #444; background: #222; color: white; }
        button { padding: 25px; width: 95%; font-size: 22px; cursor: pointer; border: none; border-radius: 18px; font-weight: bold; text-transform: uppercase; }
        .btn-join { background: #3b82f6; color: white; }
        .btn-ready { background: #22c55e; color: white; height: 250px; margin-top: 20px; box-shadow: 0 0 20px rgba(34,197,94,0.4); }
        .btn-cancel { background: #ef4444; color: white; margin-top: 30px; padding: 15px; font-size: 16px; width: 60%; }
        .status-msg { margin: 15px; font-size: 20px; font-weight: bold; }
        .ready-state { background: #064e3b !important; }
    </style>
</head>
<body>

    <div id="setup" class="setup-screen">
        <h1>Welcome</h1>
        <p>Enter your name/aisle to start</p>
        <input type="text" id="runnerName" placeholder="e.g. John - Aisle 1">
        <button class="btn-join" onclick="register()">Join Session</button>
    </div>

    <div id="active" class="active-screen">
        <h2 id="greeting">Hi Runner</h2>
        <div id="statusIndicator" class="status-msg" style="color: #666;">Status: Waiting</div>
        <button id="readyBtn" class="btn-ready" onclick="setStatus(true)">I HAVE A PERSON</button>
        <button class="btn-cancel" onclick="setStatus(false)">CANCEL</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAvCi3zJFyC-MTyoGR941HFupcUMgPlvtM",
            authDomain: "runner-qna-webapp.firebaseapp.com",
            databaseURL: "https://runner-qna-webapp-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "runner-qna-webapp",
            storageBucket: "runner-qna-webapp.appspot.com",
            messagingSenderId: "553192423696",
            appId: "1:553192423696:web:95785e12d122407eb46595"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        
        let myName = localStorage.getItem('activeRunnerName');

        if (myName) { showActiveScreen(); }

        function register() {
            myName = document.getElementById('runnerName').value.trim();
            if (!myName) return alert("Please enter your name!");
            localStorage.setItem('activeRunnerName', myName);
            showActiveScreen();
            setStatus(false); 
        }

        function showActiveScreen() {
            document.getElementById('setup').style.display = 'none';
            document.getElementById('active').style.display = 'block';
            document.getElementById('greeting').innerText = myName;
            
            // Listen for Remote Reset from Monitor
            database.ref('liveSession/' + myName).on('value', (snap) => {
                const data = snap.val();
                if (!data) { // If monitor wipes data, reset runner UI
                    document.getElementById('statusIndicator').innerText = "Status: Waiting";
                    document.getElementById('statusIndicator').style.color = "#666";
                    document.body.classList.remove('ready-state');
                } else {
                    document.getElementById('statusIndicator').innerText = data.active ? "STATUS: READY" : "Status: Waiting";
                    document.getElementById('statusIndicator').style.color = data.active ? "#22c55e" : "#666";
                    if(data.active) document.body.classList.add('ready-state');
                    else document.body.classList.remove('ready-state');
                }
            });
        }

        function setStatus(isReady) {
            database.ref('liveSession/' + myName).set({ active: isReady });
        }
    </script>
</body>
</html>
