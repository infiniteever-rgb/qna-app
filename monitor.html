<!DOCTYPE html>
<html>
<head>
    <title>Q&A Master Monitor</title>
    <style>
        body { background: #000; color: #fff; font-family: -apple-system, sans-serif; margin: 0; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #222; padding-bottom: 15px; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; min-height: 70vh; }
        .card { 
            border: 4px solid #333; border-radius: 25px; background: #111;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 30px; transition: all 0.2s ease;
        }
        .name-text { font-size: 38px; font-weight: 900; text-align: center; text-transform: uppercase; color: #444; }
        
        /* State: Runner has a person */
        .ready { background: #052e16 !important; border-color: #22c55e !important; box-shadow: 0 0 40px rgba(34,197,94,0.2); }
        .ready .name-text { color: #fff; animation: pulse 1.5s infinite; }
        
        .clear-single { margin-top: 20px; padding: 12px 24px; background: #22c55e; border: none; color: white; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 18px; }
        
        .controls { background: #111; padding: 15px; border-radius: 15px; display: flex; gap: 10px; }
        .btn-danger { background: #991b1b; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        .empty-msg { grid-column: 1/-1; text-align: center; color: #444; font-size: 24px; margin-top: 100px; }
    </style>
</head>
<body>

    <div class="header">
        <h1 style="margin:0; color:#3b82f6;">Q&A MONITOR</h1>
        <div class="controls">
            <button class="btn-danger" onclick="resetSession()">RESET NEW SESSION</button>
        </div>
    </div>

    <div class="grid" id="monitorGrid">
        <div class="empty-msg">No runners connected yet...</div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAvCi3zJFyC-MTyoGR941HFupcUMgPlvtM",
            authDomain: "runner-qna-webapp.firebaseapp.com",
            databaseURL: "https://runner-qna-webapp-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "runner-qna-webapp",
            storageBucket: "runner-qna-webapp.appspot.com",
            messagingSenderId: "553192423696",
            appId: "1:553192423696:web:95785e12d122407eb46595"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        database.ref('liveSession').on('value', (snap) => {
            const data = snap.val();
            const grid = document.getElementById('monitorGrid');
            grid.innerHTML = "";

            if (!data) {
                grid.innerHTML = '<div class="empty-msg">Waiting for runners to join...</div>';
                return;
            }

            Object.keys(data).forEach(name => {
                const active = data[name].active;
                const card = document.createElement('div');
                card.className = `card ${active ? 'ready' : ''}`;
                
                card.innerHTML = `
                    <div class="name-text">${name}</div>
                    ${active ? `<button class="clear-single" onclick="clearRunner('${name}')">MARK AS ANSWERED</button>` : ''}
                `;
                grid.appendChild(card);
            });
        });

        function clearRunner(name) {
            database.ref('liveSession/' + name).update({ active: false });
        }

        function resetSession() {
            if(confirm("This will clear all names and reset the board for the next session. Continue?")) {
                database.ref('liveSession').remove();
            }
        }
    </script>
</body>
</html>
