<!DOCTYPE html>
<html>
<head>
    <title>Theatre Master Monitor</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; padding: 10px; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        .header { display: flex; justify-content: space-between; padding: 10px; background: #111; }
        
        .theatre-grid { 
            display: grid; 
            grid-template-rows: repeat(4, 1fr); 
            grid-template-columns: 1fr 1fr;
            gap: 10px; flex-grow: 1; padding: 10px;
        }

        /* Fixed Slots */
        .slot { border: 2px dashed #222; border-radius: 15px; display: flex; align-items: center; justify-content: center; position: relative; }
        .slot-label { position: absolute; top: 5px; left: 10px; font-size: 10px; color: #333; }

        /* Positioning */
        #slot-row1_mid { grid-row: 1; grid-column: 1 / span 2; }
        #slot-row2_left { grid-row: 2; grid-column: 1; }
        #slot-row2_mid { grid-row: 2; grid-column: 1 / span 2; z-index: 1; width: 50%; margin: 0 auto; border-style: solid; background: #000; }
        #slot-row2_right { grid-row: 2; grid-column: 2; }
        #slot-row3_left { grid-row: 3; grid-column: 1; }
        #slot-row3_right { grid-row: 3; grid-column: 2; }
        #slot-row4_left { grid-row: 4; grid-column: 1; }
        #slot-row4_right { grid-row: 4; grid-column: 2; }

        .card { 
            width: 100%; height: 100%; border-radius: 15px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: #111; border: 3px solid #333;
        }
        .ready { background: #052e16 !important; border-color: #22c55e !important; animation: blink 1s infinite; }
        .name-text { font-size: 28px; font-weight: bold; color: #444; text-transform: uppercase; }
        .ready .name-text { color: #fff; font-size: 34px; }
        
        .btn-done { margin-top: 10px; padding: 8px 15px; background: #22c55e; border: none; color: white; border-radius: 5px; font-weight: bold; cursor: pointer; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
    </style>
</head>
<body>

    <div class="header">
        <span>THEATRE Q&A MAP</span>
        <button onclick="resetAll()">NEW SESSION (RESET)</button>
    </div>

    <div class="theatre-grid">
        <div class="slot" id="slot-row1_mid"><div class="slot-label">L3 CENTER</div></div>
        <div class="slot" id="slot-row2_left"><div class="slot-label">L2 LEFT</div></div>
        <div class="slot" id="slot-row2_mid"><div class="slot-label">L2 CENTER</div></div>
        <div class="slot" id="slot-row2_right"><div class="slot-label">L2 RIGHT</div></div>
        <div class="slot" id="slot-row3_left"><div class="slot-label">FLOOR MID-L</div></div>
        <div class="slot" id="slot-row3_right"><div class="slot-label">FLOOR MID-R</div></div>
        <div class="slot" id="slot-row4_left"><div class="slot-label">FLOOR EX-L</div></div>
        <div class="slot" id="slot-row4_right"><div class="slot-label">FLOOR EX-R</div></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAvCi3zJFyC-MTyoGR941HFupcUMgPlvtM",
            authDomain: "runner-qna-webapp.firebaseapp.com",
            databaseURL: "https://runner-qna-webapp-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "runner-qna-webapp",
            storageBucket: "runner-qna-webapp.appspot.com",
            messagingSenderId: "553192423696",
            appId: "1:553192423696:web:95785e12d122407eb46595"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        database.ref('liveSession').on('value', (snap) => {
            const data = snap.val() || {};
            
            // Clear all slots first (keep the labels)
            document.querySelectorAll('.slot').forEach(slot => {
                const label = slot.querySelector('.slot-label').outerHTML;
                slot.innerHTML = label;
            });

            Object.keys(data).forEach(name => {
                const runner = data[name];
                const slot = document.getElementById('slot-' + runner.zone);
                if (slot) {
                    const card = document.createElement('div');
                    card.className = `card ${runner.active ? 'ready' : ''}`;
                    card.innerHTML = `
                        <div class="name-text">${name}</div>
                        ${runner.active ? `<button class="btn-done" onclick="clearRunner('${name}')">DONE</button>` : ''}
                    `;
                    slot.appendChild(card);
                }
            });
        });

        function clearRunner(name) {
            database.ref('liveSession/' + name).update({ active: false });
        }

        function resetAll() {
            if(confirm("Wipe all runners?")) database.ref('liveSession').remove();
        }
    </script>
</body>
</html>
