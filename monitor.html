<!DOCTYPE html>
<html>
<head>
    <title>Theatre Master Monitor</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; padding: 10px; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        .header { display: flex; justify-content: space-between; padding: 10px; background: #111; align-items: center; }
        
        .theatre-grid { 
            display: grid; 
            grid-template-rows: repeat(4, 1fr); 
            grid-template-columns: 1fr 1fr;
            gap: 12px; flex-grow: 1; padding: 10px;
        }

        .slot { border: 2px dashed #222; border-radius: 15px; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
        .slot-label { position: absolute; top: 8px; left: 12px; font-size: 11px; color: #444; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }

        /* Row Positioning */
        #slot-row1_left { grid-row: 1; grid-column: 1; }
        #slot-row1_right { grid-row: 1; grid-column: 2; }
        #slot-row2_left { grid-row: 2; grid-column: 1; }
        #slot-row2_right { grid-row: 2; grid-column: 2; }
        #slot-row3_left { grid-row: 3; grid-column: 1; }
        #slot-row3_right { grid-row: 3; grid-column: 2; }
        #slot-row4_left { grid-row: 4; grid-column: 1; }
        #slot-row4_right { grid-row: 4; grid-column: 2; }

        .card { 
            width: 100%; height: 100%; border-radius: 15px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: #0a0a0a; border: 3px solid #222; z-index: 2;
        }
        .ready { background: #052e16 !important; border-color: #22c55e !important; animation: blink 1.2s infinite; }
        .name-text { font-size: 30px; font-weight: 900; color: #333; text-transform: uppercase; }
        .ready .name-text { color: #fff; font-size: 36px; }
        
        .btn-done { margin-top: 15px; padding: 10px 20px; background: #22c55e; border: none; color: white; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; }
        @keyframes blink { 0%, 100% { opacity: 1; box-shadow: inset 0 0 20px rgba(34,197,94,0.3); } 50% { opacity: 0.8; box-shadow: inset 0 0 5px rgba(34,197,94,0.1); } }
        
        .reset-btn { background: #991b1b; color: white; border: none; padding: 8px 15px; border-radius: 6px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <span style="color:#3b82f6; font-size: 18px; font-weight: bold;">STAGE MONITOR: THEATRE LAYOUT</span>
        <button class="reset-btn" onclick="resetAll()">RESET NEW SESSION</button>
    </div>

    <div class="theatre-grid">
        <div class="slot" id="slot-row1_left"><div class="slot-label">Circle 2 - Center</div></div>
        <div class="slot" id="slot-row1_right"><div class="slot-label">Circle 1 - Mid</div></div>
        
        <div class="slot" id="slot-row2_left"><div class="slot-label">Circle 2 - Left</div></div>
        <div class="slot" id="slot-row2_right"><div class="slot-label">Circle 2 - Right</div></div>
        
        <div class="slot" id="slot-row3_left"><div class="slot-label">Stalls - Mid Left</div></div>
        <div class="slot" id="slot-row3_right"><div class="slot-label">Stalls - Mid Right</div></div>
        
        <div class="slot" id="slot-row4_left"><div class="slot-label">Stalls - Ex Left</div></div>
        <div class="slot" id="slot-row4_right"><div class="slot-label">Stalls - Ex Right</div></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAvCi3zJFyC-MTyoGR941HFupcUMgPlvtM",
            authDomain: "runner-qna-webapp.firebaseapp.com",
            databaseURL: "https://runner-qna-webapp-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "runner-qna-webapp",
            storageBucket: "runner-qna-webapp.appspot.com",
            messagingSenderId: "553192423696",
            appId: "1:553192423696:web:95785e12d122407eb46595"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        database.ref('liveSession').on('value', (snap) => {
            const data = snap.val() || {};
            
            document.querySelectorAll('.slot').forEach(slot => {
                const label = slot.querySelector('.slot-label').outerHTML;
                slot.innerHTML = label;
            });

            Object.keys(data).forEach(name => {
                const runner = data[name];
                const slot = document.getElementById('slot-' + runner.zone);
                if (slot) {
                    const card = document.createElement('div');
                    card.className = `card ${runner.active ? 'ready' : ''}`;
                    card.innerHTML = `
                        <div class="name-text">${name}</div>
                        ${runner.active ? `<button class="btn-done" onclick="clearRunner('${name}')">MARK ANSWERED</button>` : ''}
                    `;
                    slot.appendChild(card);
                }
            });
        });

        function clearRunner(name) {
            database.ref('liveSession/' + name).update({ active: false });
        }

        function resetAll() {
            if(confirm("End current session? This logs out all runners.")) database.ref('liveSession').remove();
        }
    </script>
</body>
</html>
