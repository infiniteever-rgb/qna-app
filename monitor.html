<!DOCTYPE html>
<html>
<head>
    <title>Testimony Pastors Monitor</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; padding: 10px; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        .header { display: flex; justify-content: space-between; padding: 10px; background: #111; align-items: center; border-bottom: 2px solid #333; }
        
        .theatre-grid { 
            display: grid; 
            grid-template-rows: repeat(4, 1fr); 
            grid-template-columns: 1fr 1fr;
            gap: 15px; flex-grow: 1; padding: 15px;
        }

        .slot { border: 1px solid #222; border-radius: 15px; display: flex; align-items: center; justify-content: center; position: relative; background: #050505; }
        .slot-label { position: absolute; top: 10px; left: 15px; font-size: 11px; color: #444; text-transform: uppercase; letter-spacing: 1px; }

        /* Row Assignments */
        .circle2-slot { grid-row: 1; }
        .circle1-slot { grid-row: 2; }
        .stalls-row3 { grid-row: 3; }
        .stalls-row4 { grid-row: 4; }

        .card { 
            width: 100%; height: 100%; border-radius: 15px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: #1a1a1a; border: 2px solid #333; z-index: 2;
        }
        
        /* Brightened Inactive State */
        .name-text { font-size: 32px; font-weight: bold; color: #E0E0E0; text-transform: uppercase; text-align: center; }
        
        /* Active State */
        .ready { background: #052e16 !important; border-color: #22c55e !important; animation: blink 1s infinite; }
        .ready .name-text { color: #fff; font-size: 40px; font-weight: 900; }
        
        .btn-done { margin-top: 15px; padding: 12px 25px; background: #22c55e; border: none; color: white; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 18px; }
        @keyframes blink { 0%, 100% { opacity: 1; box-shadow: inset 0 0 30px rgba(34,197,94,0.4); } 50% { opacity: 0.8; } }
        
        .reset-btn { background: #444; color: #bbb; border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <span style="color:#3b82f6; font-size: 22px; font-weight: bold;">TESTIMONY PASTORS</span>
        <button class="reset-btn" onclick="resetAll()">RESET SESSION</button>
    </div>

    <div class="theatre-grid" id="gridContainer">
        </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAvCi3zJFyC-MTyoGR941HFupcUMgPlvtM",
            authDomain: "runner-qna-webapp.firebaseapp.com",
            databaseURL: "https://runner-qna-webapp-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "runner-qna-webapp",
            storageBucket: "runner-qna-webapp.appspot.com",
            messagingSenderId: "553192423696",
            appId: "1:553192423696:web:95785e12d122407eb46595"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        database.ref('liveSession').on('value', (snap) => {
            const data = snap.val() || {};
            const container = document.getElementById('gridContainer');
            container.innerHTML = "";

            // Arrays to hold runners by level
            const circle2 = [];
            const circle1 = [];
            const stalls = [];

            Object.keys(data).forEach(name => {
                const runner = { name, ...data[name] };
                if (runner.level === 'circle2') circle2.push(runner);
                else if (runner.level === 'circle1') circle1.push(runner);
                else stalls.push(runner);
            });

            // Helper to create cards
            const createCard = (runner, row, col) => {
                const slot = document.createElement('div');
                slot.className = 'slot';
                slot.style.gridRow = row;
                slot.style.gridColumn = col;
                
                const card = document.createElement('div');
                card.className = `card ${runner.active ? 'ready' : ''}`;
                card.innerHTML = `
                    <div class="name-text">${runner.name}</div>
                    ${runner.active ? `<button class="btn-done" onclick="clearRunner('${runner.name}')">DONE</button>` : ''}
                `;
                slot.appendChild(card);
                container.appendChild(slot);
            };

            // Render Circle 2 (Row 1)
            circle2.slice(0, 2).forEach((r, i) => createCard(r, 1, i + 1));
            // Render Circle 1 (Row 2)
            circle1.slice(0, 2).forEach((r, i) => createCard(r, 2, i + 1));
            // Render Stalls (Rows 3 & 4)
            stalls.slice(0, 2).forEach((r, i) => createCard(r, 3, i + 1));
            stalls.slice(2, 4).forEach((r, i) => createCard(r, 4, i + 1));
        });

        function clearRunner(name) {
            database.ref('liveSession/' + name).update({ active: false });
        }

        function resetAll() {
            if(confirm("End session? All runners will be logged out.")) database.ref('liveSession').remove();
        }
    </script>
</body>
</html>
