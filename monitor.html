<!DOCTYPE html>
<html>
<head>
    <title>Theatre Master Map</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; padding: 15px; height: 100vh; display: flex; flex-direction: column; }
        .header { display: flex; justify-content: space-between; padding-bottom: 10px; border-bottom: 2px solid #222; margin-bottom: 15px; }
        
        /* 4-Row Theatre Map */
        .theatre-grid { 
            display: grid; 
            grid-template-rows: repeat(4, 1fr); 
            grid-template-columns: 1fr 1fr;
            gap: 15px; flex-grow: 1; 
        }

        /* Logic for placing cards in rows */
        .zone-row1_mid { grid-row: 1; grid-column: 1 / span 2; }
        .zone-row2_left { grid-row: 2; grid-column: 1; }
        .zone-row2_right { grid-row: 2; grid-column: 2; }
        .zone-row3_left { grid-row: 3; grid-column: 1; }
        .zone-row3_right { grid-row: 3; grid-column: 2; }
        .zone-row4_left { grid-row: 4; grid-column: 1; }
        .zone-row4_right { grid-row: 4; grid-column: 2; }

        .card { 
            background: #111; border: 3px solid #333; border-radius: 20px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            position: relative; transition: 0.3s;
        }
        .ready { background: #052e16 !important; border-color: #22c55e !important; animation: glow 1.5s infinite; }
        .name-text { font-size: 32px; font-weight: 900; text-transform: uppercase; color: #444; }
        .ready .name-text { color: #fff; }
        
        .btn-done { margin-top: 15px; padding: 10px 20px; background: #22c55e; border: none; color: white; border-radius: 8px; cursor: pointer; font-weight: bold; }
        
        .label { position: absolute; top: 10px; left: 15px; font-size: 12px; color: #333; font-weight: bold; }
        @keyframes glow { 0%, 100% { box-shadow: inset 0 0 20px #22c55e; } 50% { box-shadow: inset 0 0 5px #22c55e; } }
    </style>
</head>
<body>

    <div class="header">
        <span style="color:#3b82f6; font-weight:bold;">STAGE MONITOR: THEATRE MAP</span>
        <button onclick="resetAll()" style="background:#333; color:#888; border:none; padding:5px 15px; border-radius:5px; cursor:pointer;">RESET ALL</button>
    </div>

    <div class="theatre-grid" id="mainGrid"></div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAvCi3zJFyC-MTyoGR941HFupcUMgPlvtM",
            authDomain: "runner-qna-webapp.firebaseapp.com",
            databaseURL: "https://runner-qna-webapp-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "runner-qna-webapp",
            storageBucket: "runner-qna-webapp.appspot.com",
            messagingSenderId: "553192423696",
            appId: "1:553192423696:web:95785e12d122407eb46595"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        database.ref('liveSession').on('value', (snap) => {
            const data = snap.val() || {};
            const grid = document.getElementById('mainGrid');
            grid.innerHTML = "";

            Object.keys(data).forEach(name => {
                const runner = data[name];
                const card = document.createElement('div');
                // Use the zone to set the class (handles row/column placement)
                card.className = `card zone-${runner.zone} ${runner.active ? 'ready' : ''}`;
                
                card.innerHTML = `
                    <div class="label">${runner.zone.replace('_',' ').toUpperCase()}</div>
                    <div class="name-text">${name}</div>
                    ${runner.active ? `<button class="btn-done" onclick="clearRunner('${name}')">ANSWERED</button>` : ''}
                `;
                grid.appendChild(card);
            });
        });

        function clearRunner(name) {
            database.ref('liveSession/' + name).update({ active: false });
        }

        function resetAll() {
            if(confirm("End session? All runners will be logged out.")) {
                database.ref('liveSession').remove();
            }
        }
    </script>
</body>
</html>
